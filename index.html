<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Talking Pet - Deluxe Edition</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: 'Segoe UI', sans-serif; background: #222; }
        
        #game-view {
            width: 100vw; height: 100vh;
            background: url('https://i.postimg.cc/Njpgjv3R/sr2061fb2c549ee.gif') no-repeat center center;
            background-size: cover;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative;
        }

        #particle-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }

        #pet-container {
            position: relative; width: 450px; height: 600px;
            margin-bottom: 50px; z-index: 5;
        }

        #pet-img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }

        .hitbox { position: absolute; cursor: crosshair; border-radius: 50%; z-index: 6; }
        #head-hit { top: 10%; left: 25%; width: 50%; height: 30%; }
        #body-hit { top: 40%; left: 20%; width: 60%; height: 50%; }

        /* Item System Styles */
        #item-menu {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.2); backdrop-filter: blur(10px);
            padding: 10px; border-radius: 15px; display: flex; gap: 15px; z-index: 100;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .menu-item { width: 60px; height: 60px; cursor: grab; object-fit: contain; transition: 0.2s; }
        .menu-item:hover { transform: scale(1.1); }

        .placed-item {
            position: absolute; cursor: move; z-index: 20;
            user-select: none; -webkit-user-drag: none;
        }

        #mic-status {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6); color: white; padding: 10px 20px;
            border-radius: 30px; font-weight: bold; pointer-events: none; z-index: 20;
        }
        
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>🐶 Super Talking Pet 🐶</h1>
        <p>Click to start! Drag items from bottom to dress him up!</p>
    </div>

    <div id="mic-status">Mic: Idle</div>

    <div id="game-view">
        <canvas id="particle-canvas"></canvas>
        
        <div id="pet-container" id="drop-zone">
            <img id="pet-img" src="https://i.postimg.cc/FzWBNbp6/bd53a34c-c94e-4f9a-9024-06b5faa3df41-removalai-preview.png">
            <div id="head-hit" class="hitbox"></div>
            <div id="body-hit" class="hitbox"></div>
            </div>

        <div id="item-menu">
            <img src="https://i.postimg.cc/wBtL5zdv/Pngtree-floppy-hat-pixel-art-vector-17421505.png" class="menu-item" data-type="hat" title="Hat">
            <img src="https://i.postimg.cc/bvcFywxC/pngwing-com-(11).png" class="menu-item" data-type="glass" title="Glasses">
            <img src="https://i.postimg.cc/zfZPzGCM/pngwing-com-(10).png" class="menu-item" data-type="guitar" title="Guitar">
            <img src="https://i.postimg.cc/xdDFf1vF/pngwing-com.png" class="menu-item" data-type="heart" title="Love">
        </div>
    </div>

    <audio id="snd-hit" src="hit.mp3"></audio>
    <audio id="snd-purr" src="Purring.mp3" loop></audio>
    <audio id="snd-bark" src="Bark after 10 hit.mp3"></audio>
    <audio id="snd-yes" src="yes.mp3"></audio>
    <audio id="snd-no" src="no.mp3"></audio>

    <script>
        const petImg = document.getElementById('pet-img');
        const petContainer = document.getElementById('pet-container');
        const micStatus = document.getElementById('mic-status');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let hitCount = 0;
        let isPetting = false;
        let particles = [];

        const IMAGES = {
            idle: 'https://i.postimg.cc/FzWBNbp6/bd53a34c-c94e-4f9a-9024-06b5faa3df41-removalai-preview.png',
            pet: ['https://i.postimg.cc/FzWBNbp0/3a2749b8-fa7e-4453-8e4b-fe572db89a87-removalai-preview.png', 'https://i.postimg.cc/SRTvkLd6/72804f73-b8d9-4b5e-844c-739064a6b28d-removalai-preview.png'],
            hitBelly: ['https://i.postimg.cc/NFJzB8Dz/14993416-4d5e-4254-b889-d5f07af0872f-removalai-preview.png', 'https://i.postimg.cc/wMfGg520/4c63c168-941f-400f-8009-1afc4cb0ea52-removalai-preview.png', 'https://i.postimg.cc/wMfGg52b/da9ca3c1-2702-4c48-b356-d42d63fd0512-removalai-preview.png'],
            hitLeg: ['https://i.postimg.cc/SRTvkLdg/51e264ca-44cf-41be-a6b6-e27bb7dd39bf-removalai-preview.png', 'https://i.postimg.cc/nrRPpK2v/5ef3ea54-85dc-4549-b4ac-bd095a650c9c-removalai-preview.png'],
            hitHand: ['https://i.postimg.cc/hvy5c8ss/2b3bbc1a-9e59-49ee-8d59-2246e33293bf-removalai-preview.png', 'https://i.postimg.cc/BbYV45pN/f70b0010-5117-49ba-8626-e292548e5895-removalai-preview.png'],
            yes: 'https://i.postimg.cc/XqHz4KLd/17c16791-12cc-469c-a222-61f3d8e391f7-removalai-preview.png'
        };

        // --- INTERACTION LOGIC ---
        document.getElementById('start-overlay').onclick = () => {
            document.getElementById('start-overlay').style.display = 'none';
            initMic();
        };

        function handleHit(type, x, y) {
            hitCount++;
            createBurst(x, y, 12);
            
            if (hitCount >= 10) {
                playSound('snd-bark');
                petImg.src = IMAGES.hitHand[0]; // Angry face
                hitCount = 0;
            } else {
                playSound('snd-hit');
                const pool = IMAGES[type];
                petImg.src = pool[Math.floor(Math.random() * pool.length)];
            }
            resetToIdle(800);
        }

        document.getElementById('head-hit').onmousedown = (e) => handleHit('hitHand', e.clientX, e.clientY);
        document.getElementById('body-hit').onmousedown = (e) => {
            if(e.buttons === 1) handleHit('hitBelly', e.clientX, e.clientY);
        };

        document.getElementById('body-hit').onmousemove = (e) => {
            if (e.buttons === 1 && !isPetting) {
                isPetting = true;
                petImg.src = IMAGES.pet[Math.floor(Math.random()*IMAGES.pet.length)];
                document.getElementById('snd-purr').play();
            }
            if (isPetting) createBurst(e.clientX, e.clientY, 1);
        };

        window.onmouseup = () => {
            isPetting = false;
            document.getElementById('snd-purr').pause();
        };

        function resetToIdle(time) {
            setTimeout(() => { if(!isPetting) petImg.src = IMAGES.idle; }, time);
        }

        function playSound(id) {
            const s = document.getElementById(id);
            s.currentTime = 0; s.play();
        }

        // --- DRAG AND DROP SYSTEM ---
        let activeItem = null;

        document.querySelectorAll('.menu-item').forEach(item => {
            item.onmousedown = (e) => {
                const clone = item.cloneNode(true);
                clone.classList.remove('menu-item');
                clone.classList.add('placed-item');
                clone.style.width = "100px"; // Default size for placed items
                petContainer.appendChild(clone);
                startDragging(clone, e);
            };
        });

        function startDragging(element, e) {
            activeItem = element;
            let offset = {
                x: e.clientX - element.getBoundingClientRect().left,
                y: e.clientY - element.getBoundingClientRect().top
            };

            function move(e) {
                const rect = petContainer.getBoundingClientRect();
                element.style.left = (e.clientX - rect.left - offset.x) + 'px';
                element.style.top = (e.clientY - rect.top - offset.y) + 'px';
            }

            function stop() {
                window.removeEventListener('mousemove', move);
                window.removeEventListener('mouseup', stop);
                activeItem = null;
            }

            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
        }

        // Allow moving already placed items
        petContainer.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('placed-item')) {
                startDragging(e.target, e);
            }
        });

        // --- PARTICLES ---
        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 20 + 10;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * -6 - 2;
                this.life = 1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                this.speedY += 0.2; this.life -= 0.03;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2); ctx.fill();
            }
        }

        function createBurst(x, y, count) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- MIC REACTION ---
        async function initMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                const analyser = audioCtx.createAnalyser();
                source.connect(analyser);
                const data = new Uint8Array(analyser.frequencyBinCount);

                function checkLevel() {
                    analyser.getByteFrequencyData(data);
                    let vol = data.reduce((a, b) => a + b) / data.length;
                    if (vol > 35) {
                        micStatus.innerText = "Listening...";
                        setTimeout(() => {
                            petImg.src = IMAGES.yes;
                            playSound('snd-yes');
                            resetToIdle(2000);
                        }, 1000);
                    }
                    requestAnimationFrame(checkLevel);
                }
                checkLevel();
            } catch (e) { micStatus.innerText = "Mic Error"; }
        }
    </script>
</body>
</html>
